<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬詞彙庫 (Supabase 雲端版)</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #e1e8ed;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h2 { color: var(--primary); text-align: center; margin-bottom: 25px; }
        .controls { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 25px; 
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .import-options {
            display: flex;
            gap: 20px;
            font-size: 0.95em;
            color: var(--primary);
            font-weight: 500;
        }
        .import-options label { cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .btn-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .upload-btn, .delete-btn, .clear-btn {
            flex: 1;
            min-width: 140px;
            display: block;
            text-align: center;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            transition: opacity 0.2s;
            border: none;
            color: white;
            box-sizing: border-box;
        }
        .upload-btn { background-color: var(--accent); }
        .delete-btn { background-color: #e67e22; }
        .clear-btn { background-color: #e74c3c; }
        .upload-btn:hover, .delete-btn:hover, .clear-btn:hover { opacity: 0.9; }
        input[type="file"] { display: none; }
        
        .search-bar, .sort-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
            box-sizing: border-box;
        }
        .search-bar:focus, .sort-select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        
        #statusText {
            text-align: right;
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            position: relative;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }
        .card-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .word-title {
            color: var(--primary);
            margin: 0;
            font-size: 1.8em;
        }
        .circle-checkbox {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .circle-checkbox::before {
            content: "";
            width: 0.8em;
            height: 0.8em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--accent);
        }
        .circle-checkbox:checked {
            border-color: var(--accent);
        }
        .circle-checkbox:checked::before {
            transform: scale(1);
        }
        .ipa { color: var(--text-muted); font-family: monospace; font-size: 1.1em; }
        .translation {
            font-size: 1.3em;
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 15px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tag {
            background: #e8f4f8;
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 500;
        }
        .tag.pos { background: #fdf2e9; color: #d35400; }
        .tag.source { background: #eaeded; color: #7f8c8d; }
        .tag.ai { background: #f4ecf8; color: #8e44ad; }
        .section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }
        .section-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        .content-text {
            white-space: pre-wrap;
            color: var(--text-main);
        }
        .audio-link {
            display: inline-block;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            padding: 8px 15px;
            background: #f0f8ff;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .audio-link:hover { background: #e1f0fa; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>
    <h2>📚 我的專屬詞彙庫 (雲端同步版)</h2>
    
    <div class="controls">
        <div class="import-options">
            <label><input type="radio" name="importMode" value="replace" checked> 🔄 替換現有資料</label>
            <label><input type="radio" name="importMode" value="append"> ➕ 附加到現有資料</label>
        </div>
        <div class="btn-container">
            <label class="upload-btn">
                📁 點此匯入 CSV 檔案
                <input type="file" id="csvFileInput" accept=".csv">
            </label>
            <button id="deleteBtn" class="delete-btn">❌ 刪除選取項目</button>
            <button id="clearBtn" class="clear-btn">🗑️ 清除所有資料</button>
        </div>
        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 搜尋單字、翻譯或例句內容...">
        <select id="sortSelect" class="sort-select">
            <option value="original">🕒 預設排序 (原始順序)</option>
            <option value="asc">🅰️ 字母順序 (A-Z)</option>
            <option value="desc">🇿 字母順序 (Z-A)</option>
        </select>
    </div>

    <div id="statusText">正在連線至雲端...</div>
    <div id="dictionaryContainer"></div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // ⚠️ 乾淨的 SUPABASE 網址，沒有多餘的 /rest/v1/
        const SUPABASE_URL = 'https://rdxtwzyebyllsuqajwcp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeHR3enllYnlsbHN1cWFqd2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjE5MjcsImV4cCI6MjA5ODEzNzkyN30.iu_-J6S9vEpisMV1nhtepNilsMCacZdvmXehzIOIxdk';
       
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
        let dictionaryData = [];

        window.addEventListener('DOMContentLoaded', loadDataFromCloud);

        document.getElementById('csvFileInput').addEventListener('change', handleCsvImport);
        document.getElementById('searchInput').addEventListener('input', displayData);
        document.getElementById('sortSelect').addEventListener('change', displayData);
        document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
        document.getElementById('clearBtn').addEventListener('click', clearDictionary);

        async function loadDataFromCloud() {
            document.getElementById('statusText').innerText = '正在讀取雲端資料...';
            try {
                let { data, error } = await supabase
                    .from('dictionary')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                dictionaryData = data || [];
                updateStatus();
                displayData();
            } catch (err) {
                console.error(err);
                document.getElementById('dictionaryContainer').innerHTML = 
                    `<div class="empty-state" style="color: #e74c3c;">❌ 雲端連線失敗，請檢查 Supabase 網址與金鑰是否填寫正確。</div>`;
                document.getElementById('statusText').innerText = '連線失敗';
            }
        }

        function handleCsvImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const text = e.target.result;
                const newData = parseCSV(text);
                if (newData.length === 0) {
                    alert('未解析到有效數據，請檢查 CSV 格式。');
                    return;
                }

                const importMode = document.querySelector('input[name="importMode"]:checked').value;
                document.getElementById('statusText').innerText = '正在處理同步...';

                try {
                    if (importMode === 'replace') {
                        const { error: delError } = await supabase.from('dictionary').delete().gt('id', 0);
                        if (delError) throw delError;
                    }

                    // 採用分批（每 20 筆一組）寫入，防止長字串大請求被 Supabase 拒絕
                    const chunkSize = 20;
                    for (let i = 0; i < newData.length; i += chunkSize) {
                        const chunk = newData.slice(i, i + chunkSize);
                        const { error: insError } = await supabase.from('dictionary').insert(chunk);
                        if (insError) throw insError;
                    }

                    alert('資料成功同步至雲端！');
                    await loadDataFromCloud();
                } catch (err) {
                    alert('資料同步至雲端時發生錯誤：' + err.message);
                    loadDataFromCloud();
                }
                document.getElementById('searchInput').value = '';
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        async function deleteSelected() {
            const checkboxes = document.querySelectorAll('.card-selector:checked');
            if (checkboxes.length === 0) {
                alert('請先勾選想要刪除的單字項目圓圈！');
                return;
            }
            if (confirm(`確定要將這 ${checkboxes.length} 個選取的項目從雲端字庫中移除嗎？`)) {
                document.getElementById('statusText').innerText = '正在從雲端刪除...';
                const idsToDelete = Array.from(checkboxes).map(cb => parseInt(cb.getAttribute('data-id')));
                
                try {
                    const { error } = await supabase
                        .from('dictionary')
                        .delete()
                        .in('id', idsToDelete);

                    if (error) throw error;
                    await loadDataFromCloud();
                } catch (err) {
                    alert('從雲端刪除失敗：' + err.message);
                    loadDataFromCloud();
                }
            }
        }

        async function clearDictionary() {
            if (confirm('確定要永久清空雲端資料庫內所有的字詞紀錄嗎？')) {
                document.getElementById('statusText').innerText = '正在清空雲端資料...';
                try {
                    const { error } = await supabase.from('dictionary').delete().gt('id', 0);
                    if (error) throw error;
                    await loadDataFromCloud();
                } catch (err) {
                    alert('清空雲端失敗：' + err.message);
                    loadDataFromCloud();
                }
            }
        }

        function updateStatus() {
            document.getElementById('statusText').innerText = `目前收錄：${dictionaryData.length} 個詞彙 (已與雲端同步)`;
        }

        function displayData() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const sortValue = document.getElementById('sortSelect').value;
            
            let processedData = [...dictionaryData];
            
            if (query !== '') {
                processedData = processedData.filter(item => {
                    const word = (item.word_or_phrase || '').toLowerCase();
                    const translation = (item.translation || '').toLowerCase();
                    const meaning = (item.meaning || '').toLowerCase();
                    return word.includes(query) || translation.includes(query) || meaning.includes(query);
                });
            }
            
            if (sortValue === 'asc') {
                processedData.sort((a, b) => (a.word_or_phrase || '').localeCompare(b.word_or_phrase || '', 'en'));
            } else if (sortValue === 'desc') {
                processedData.sort((a, b) => (b.word_or_phrase || '').localeCompare(a.word_or_phrase || '', 'en'));
            }
            
            renderCards(processedData);
        }

        function parseCSV(text) {
            const result = [];
            let row = [];
            let currentStr = '';
            let insideQuote = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const nextChar = text[i + 1];
                if (char === '"') {
                    if (insideQuote && nextChar === '"') { currentStr += '"'; i++; } 
                    else { insideQuote = !insideQuote; }
                } else if (char === ',' && !insideQuote) {
                    row.push(currentStr);
                    currentStr = '';
                } else if ((char === '\n' || (char === '\r' && nextChar === '\n')) && !insideQuote) {
                    if (char === '\r') i++;
                    row.push(currentStr);
                    if (row.join('').trim() !== '') result.push(row);
                    row = [];
                    currentStr = '';
                } else { currentStr += char; }
            }
            if (currentStr || row.length > 0) { row.push(currentStr); result.push(row); }
            if (result.length < 2) return [];
            
            const headers = result[0].map(h => h.trim());
            const data = [];
            
            // 這裡已更新為最新的 Supabase 欄位名稱 (snake_case)
            const validFields = [
                'word_or_phrase', 'pronunciation_ipa', 'translation', 'part_of_speech', 
                'entry_type', 'register_and_variety', 'source', 'ai_agent', 'meaning', 
                'collocations_and_expressions', 'derived_or_related', 
                'additional_notes', 'pronunciation_link'
            ];
            
            for (let i = 1; i < result.length; i++) {
                const obj = {};
                let hasData = false;
                for (let j = 0; j < headers.length; j++) {
                    if (headers[j] && validFields.includes(headers[j])) {
                        const val = result[i][j] ? result[i][j].trim() : '';
                        obj[headers[j]] = val;
                        if (val !== '') hasData = true;
                    }
                }
                if (hasData && obj.word_or_phrase) {
                    data.push(obj);
                }
            }
            return data;
        }

        function renderCards(data) {
            const container = document.getElementById('dictionaryContainer');
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<div class="empty-state">找不到相符的詞彙或資料庫目前為空。</div>';
                return;
            }
            data.forEach(item => {
                if (!item.word_or_phrase) return; // 安全防護：沒有單字的資料不渲染
                
                const card = document.createElement('div');
                card.className = 'card';
                let html = `
                    <div class="card-header">
                        <div class="card-title-group">
                            <input type="checkbox" class="circle-checkbox card-selector" data-id="${item.id}">
                            <h3 class="word-title">${item.word_or_phrase}</h3>
                        </div>
                        ${item.pronunciation_ipa ? `<span class="ipa">${item.pronunciation_ipa}</span>` : ''}
                    </div>
                    ${item.translation ? `<div class="translation">${item.translation}</div>` : ''}
                    <div class="tags">
                        ${item.part_of_speech ? `<span class="tag pos">${item.part_of_speech}</span>` : ''}
                        ${item.entry_type ? `<span class="tag">${item.entry_type}</span>` : ''}
                        ${item.register_and_variety ? `<span class="tag">${item.register_and_variety}</span>` : ''}
                        ${item.source ? `<span class="tag source">📖 ${item.source}</span>` : ''}
                        ${item.ai_agent ? `<span class="tag ai">🤖 由 ${item.ai_agent} 生成</span>` : ''}
                    </div>
                `;

                const sectionsToRender = [
                    { title: '意思與例句 (Meaning)', key: 'meaning' },
                    { title: '搭配詞與慣用語 (Collocations)', key: 'collocations_and_expressions' },
                    { title: '衍生與相關詞彙 (Derived/Related)', key: 'derived_or_related' },
                    { title: '補充筆記 (Additional Notes)', key: 'additional_notes' }
                ];

                sectionsToRender.forEach(section => {
                    if (item[section.key]) {
                        html += `
                            <div class="section">
                                <div class="section-title">${section.title}</div>
                                <div class="content-text">${item[section.key]}</div>
                            </div>
                        `;
                    }
                });

                if (item.pronunciation_link && item.pronunciation_link.trim() !== '') {
                    html += `
                        <div class="section" style="border: none;">
                            <a href="${item.pronunciation_link.trim()}" 
                               target="_blank" 
                               rel="noopener noreferrer" 
                               class="audio-link"
                               onclick="window.open('${item.pronunciation_link.trim()}', '_blank'); return false;">
                               🔊 點此聆聽發音
                            </a>
                        </div>
                    `;
                }

                card.innerHTML = html;
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
